name: basic build
on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"
env:
  file: Containerfile
  tag: ghcr.io/${{ github.actor }}/${{ github.event.repository.name }}:latest
jobs: 
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - name: Checkout action
      uses: actions/checkout@v6
    - name: Build image
      run: |
        podman build \
          -f ${{ env.file }} \
          -t ${{ env.tag }} .

#    - name: Rechunk image with chunkah
#      run: |
#        # Export rootfs as a flat directory
#        CONTAINER=$(podman create ${{ env.tag }})
#        mkdir -p /tmp/rootfs
#        podman export $CONTAINER | tar -xC /tmp/rootfs
#        podman rm $CONTAINER

        # Capture image config for label/metadata preservation
#        export CHUNKAH_CONFIG_STR="$(podman inspect ${{ env.tag }})"

        # Rechunk: mount the rootfs dir into /chunkah, pipe OCI archive back in
#        podman run --rm \
#          -v /tmp/rootfs:/chunkah:ro \
#          --security-opt=label=disable \
#          -e CHUNKAH_CONFIG_STR \
#          quay.io/coreos/chunkah build \
#            --max-layers 128 \
#            --skip-special-files \
#            --prune /sysroot/ \
#            -t ${{ env.tag }} | podman load

#        # Clean up
#        rm -rf /tmp/rootfs
        
    - name: Rechunk image with chunkah
      run: |
        mkdir -p /tmp/rootfs
        podman export $(podman create --name rechunk ${{ env.tag }}) | tar -xC /tmp/rootfs
        podman rm rechunk
        CHUNKAH_CONFIG_STR="$(podman inspect ${{ env.tag }})" \
        podman run --rm \
          -v /tmp/rootfs:/chunkah:ro \
          --security-opt=label=disable \
          -e CHUNKAH_CONFIG_STR \
          quay.io/coreos/chunkah build --max-layers 128 --skip-special-files --prune /sysroot/ \
            -t ${{ env.tag }} | podman load

#    - name: Push image
#      run: podman push --creds=${{ github.actor }}:${{ secrets.GITHUB_TOKEN }} ${{ env.tag }}
    
    - name: Push image
      run: podman push --compression-format zstd:chunked --creds=${{ github.actor }}:${{ secrets.GITHUB_TOKEN }} ${{ env.tag }}
