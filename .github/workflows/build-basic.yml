name: basic build
on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"
env:
  file: containerfile-base
  repo: ghcr.io/${{ github.actor }}/${{ github.event.repository.name }}:latest
jobs: 
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - name: Checkout action
      uses: actions/checkout@v6
    
    - name: Free Disk Space (Ubuntu)
      uses: jlumbroso/free-disk-space@main
      with:
        # this might remove tools that are actually needed, if set to "true" but frees about 6 GB
        tool-cache: false
        # all of these default to true, but feel free to set to
        # "false" if necessary for your workflow
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true

    - name: Build image
      run: |
        podman build \
          -f ${{ env.file }} \
          -t ${{ env.repo }} .




    - name: Upgrade Podman
      run: |
        sudo mkdir -p /etc/apt/keyrings
        curl -fsSL https://download.opensuse.org/repositories/devel:/kubic:/libcontainers:/unstable/xUbuntu_24.04/Release.key \
          | gpg --dearmor \
          | sudo tee /etc/apt/keyrings/libcontainers.gpg > /dev/null
        echo "deb [signed-by=/etc/apt/keyrings/libcontainers.gpg] \
          https://download.opensuse.org/repositories/devel:/kubic:/libcontainers:/unstable/xUbuntu_24.04/ /" \
          | sudo tee /etc/apt/sources.list.d/libcontainers.list
        sudo apt update
        sudo apt install -y podman


    - name: Rechunk image with chunkah
      run: |
        export CHUNKAH_CONFIG_STR="$(podman inspect ${{ env.repo }})"
        podman run --rm \
          --mount=type=image,src=${{ env.repo }},dst=/chunkah \
          --security-opt=label=disable \
          -e CHUNKAH_CONFIG_STR \
          quay.io/coreos/chunkah build \
            --max-layers 128 \
            --skip-special-files \
            --prune /sysroot/ \
            -t ${{ env.file }} | podman load




