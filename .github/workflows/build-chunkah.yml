name: Build Image (reusable)

on:
  workflow_dispatch:
#  schedule:
#    - cron: "0 0 * * *"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Action Checkout
        uses: actions/checkout@main

      - name: Build image (buildah-build)
        id: build
        uses: redhat-actions/buildah-build@main
        with:
          image: chunkah-test
          tags: latest
          containerfiles: containerfile-chunkah

      - name: Rechunk image (chunkah)
        env:
          IMAGE: chunkah-test
          TAG: latest
        run: |
          set -xeuo pipefail
          export CHUNKAH_CONFIG_STR=$(podman inspect "${IMAGE}:${TAG}")
          podman run --rm \
            --mount=type=image,src="${IMAGE}:${TAG}",target=/chunkah \
            -e CHUNKAH_CONFIG_STR \
            quay.io/coreos/chunkah:latest \
            build \
            --compressed \
            --max-layers 128 \
            --prune /sysroot/ \
            --prune /ostree \
            --label ostree.commit- --label ostree.final-diffid- \
            --tag "${IMAGE}:${TAG}" \
          | podman load

      - name: Push to GHCR
        uses: redhat-actions/push-to-registry@main
        with:
          image: chunkah-test
          tags: latest
          registry: ghcr.io/${{ github.repository_owner }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
