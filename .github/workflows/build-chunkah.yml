name: Build Image (reusable)

on:
  workflow_dispatch:
#  schedule:
#    - cron: "0 0 * * *"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Action Checkout
        uses: actions/checkout@main

      - name: Build image (buildah-build)
        id: build
        uses: redhat-actions/buildah-build@main
        with:
          image: chunkah-test
          tags: latest
          containerfiles: containerfile-chunkah

      - name: Rechunk image (chunkah)
        env:
          IMAGE: chunkah-test
          TAG: latest
        run: |
          set -xeuo pipefail
          export CHUNKAH_CONFIG_STR=$(podman inspect "${IMAGE}:${TAG}")
          podman run --rm \
            --mount=type=image,src="${IMAGE}:${TAG}",target=/chunkah \
            -e CHUNKAH_CONFIG_STR \
            quay.io/coreos/chunkah:latest \
            build \
            --compressed \
            --max-layers 128 \
            --prune /sysroot/ \
            --prune /ostree \
            --label ostree.commit- --label ostree.final-diffid- \
            --tag "${IMAGE}:${TAG}" \
          | podman load

      - name: Compare layers with previous build
        env:
          IMAGE: chunkah-test
          TAG: latest
        run: |
          set -euo pipefail

          REMOTE_IMAGE="ghcr.io/${{ github.repository_owner }}/${IMAGE}:${TAG}"
          LOCAL_IMAGE="${IMAGE}:${TAG}"

          command -v skopeo >/dev/null || (sudo apt-get update && sudo apt-get install -y skopeo)

          skopeo inspect "docker://${REMOTE_IMAGE}" 2>/dev/null | jq -r '.Layers[]' | sort > old-layers.txt || touch old-layers.txt
          podman inspect "${LOCAL_IMAGE}" | jq -r '.[0].RootFS.Layers[]' | sort > new-layers.txt

          TOTAL=$(wc -l < new-layers.txt)
          CHANGED=$(comm -13 old-layers.txt new-layers.txt | wc -l)

          echo "Changed layers: $CHANGED / $TOTAL"

      - name: Push to GHCR
        uses: redhat-actions/push-to-registry@main
        with:
          image: chunkah-test
          tags: latest
          registry: ghcr.io/${{ github.repository_owner }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
